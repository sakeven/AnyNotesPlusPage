footer:
  made_by: 제작
  in: 위치
  press_kit: 프레스 키트
home:
  page_title: AnyNotes+ • 노트, 음성, 사진, 링크를 위한 개인 AI 받은편지함
  meta_description: 노트, 음성, 사진, 공유 시트, 채팅에서 바로 수집하세요. AnyNotes는 각 입력을 정리된 결과, 다음 단계 제안, 그리고 계속 발전하는 토픽으로 바꿔 줍니다.
  og_image_alt: 인박스 화면과 제품 슬로건을 보여 주는 AnyNotes+ 미리보기 이미지.
  app_description: 노트, 음성, 사진, 공유 시트, 채팅에서 바로 수집하세요. AnyNotes는 각 입력을 정리된 결과, 다음 단계 제안, 그리고 계속 발전하는 토픽으로 바꿔 줍니다.
  app_eyebrow: 개인 AI 받은편지함 + 주제 워크스페이스
  app_headline: "AnyNotes+ AI 노트 받은편지함"
  app_slogan: 아이디어는 자리를 찾고, 결과는 형태를 갖춥니다.
  hero_pills:
    - 노트
    - 녹음
    - 사진
    - 공유
    - 채팅
    - 주제
  app_store_badge_alt: App Store에서 다운로드
  play_store_badge_alt: Google Play에서 받기
  testflight_cta: TestFlight 사용해 보기
  hero_download_note: TestFlight 빌드의 구독은 베타 기간 동안 무료입니다. 추가 결제가 필요 없으니 앱 안에서 바로 구독해 보셔도 됩니다.
  screens:
    eyebrow: 제품 화면
    title: 현재 받은편지함, 주제 홈, 주제 상세 화면을 미리 살펴보세요.
    description: 떠오른 생각이 받은편지함으로 들어오고, 다시 계속 발전시킬 수 있는 주제로 정리되는 흐름을 보여 줍니다.
    cards:
      - title: 받은편지함
        description: 오늘의 노트, AI 결과 카드, 태그, 그리고 네 가지 주요 캡처 동작을 보여 줍니다.
        alt: AnyNotes 받은편지함 스크린샷
        image: /assets/screenshot/inbox-home.png
      - title: 주제 홈
        description: 주제 홈 화면에서 현재 관점, 최근 변화, 다음 단계를 한눈에 보여 주는 집중형 요약입니다.
        alt: AnyNotes 주제 홈 스크린샷
        image: /assets/screenshot/topic-home.png
      - title: 주제 상세
        description: 종합 요약, 변경 로그, 더 읽기 쉬운 레이아웃을 담은 심화 토픽 화면입니다.
        alt: AnyNotes 주제 상세 스크린샷
        image: /assets/screenshot/topic-detail.png
  features_intro:
    eyebrow: 실제 기록 습관에 맞춘 구조
    title: 뒤섞인 입력, 명확한 결과, 계속 이어지는 작업을 한곳에.
    description: AnyNotes는 사람들이 실제로 휴대폰에서 일하는 흐름을 기준으로 만들어졌습니다. 먼저 수집하고, AI가 방금 들어온 내용을 정리해 주고, 긴 노트 목록 속에 묻히지 않도록 같은 흐름을 계속 앞으로 밀어 줍니다.
  features:
    - title: 노트, 녹음, 사진, 공유, 채팅에서 캡처
      description: 앱 안에서 시작해도 되고 iOS 공유 시트에서 들어와도 됩니다. 텍스트, 음성, 사진, 링크, 채팅 기록이 서로 다른 공간에 흩어지지 않고 하나의 인박스 흐름으로 들어옵니다.
      fontawesome_icon_name: inbox
    - title: 모든 새 노트에 AI 결과 카드
      description: 아이디어, 회의, 리마인더, 요약, 지식 노트에 대해 AnyNotes가 깔끔한 제목, 요약, 구조화된 결과 카드, 그리고 다음 행동 제안을 자동으로 만들어 줍니다.
      fontawesome_icon_name: magic
    - title: 계속 진화하는 주제
      description: 고립된 노트에서 벗어나세요. 관련 노트를 하나의 주제로 묶고 현재 결정, 최근 변화, 다음 행동을 최신 상태로 유지할 수 있습니다.
      fontawesome_icon_name: project-diagram
    - title: 노트를 행동으로 전환
      description: 리마인더, Things 작업, 후속 이메일 초안을 만들고, AI 채팅으로 이어 가거나, 지저분한 스크린샷 대신 공유용 이미지로 결과를 내보낼 수 있습니다.
      fontawesome_icon_name: share-square
    - title: AI Chat으로 깊이 있는 작업
      description: 노트 전용 채팅을 열고, 나만의 프롬프트를 쓰고, 저장된 노트를 검색하고, 한 번의 답변으로 끝나지 않는 작업은 내장 샌드박스 워크스페이스로 넘길 수 있습니다.
      fontawesome_icon_name: comments
    - title: 검색, 보관, 동기화
      description: 검색, 태그, 고정, 아카이브 모드, 일괄 요약, 그리고 내 계정에 연결된 iCloud 저장소로 모든 내용을 쉽게 다시 찾을 수 있습니다.
      fontawesome_icon_name: search
  workflow:
    eyebrow: 사용 방식
    title: 빠른 캡처에서 바로 실행 가능한 결과까지.
    cards:
      - step: "01"
        title: 어디서든 캡처
        description: 노트, 녹음, 사진, 채팅, iOS 공유 시트로 텍스트, 링크, 이미지를 받아 보세요. 모든 입력이 하나의 일관된 흐름으로 들어옵니다.
      - step: "02"
        title: AI 받은편지함 결과 받기
        description: 새 노트마다 저장을 막지 않으면서 제목, 요약, 핵심 결과 카드, 다음 단계 제안을 받게 됩니다.
      - step: "03"
        title: 관련 작업을 함께 유지
        description: 일회성 노트에서 벗어나 주제로 최신 종합, 변화, 열린 질문, 다음 행동을 함께 볼 수 있습니다.
      - step: "04"
        title: 결과를 바깥으로 이어 보내기
        description: 결과를 리마인더 초안, Things 작업, 후속 이메일, 공유용 이미지 카드, 또는 더 깊은 AI 대화로 이어 갈 수 있습니다.
  outcomes:
    eyebrow: 앱이 만들어 주는 것
    title: 원본 노트보다 바로 활용하기 쉬운 결과.
    result_types:
      eyebrow: 받은편지함 결과 유형
      title: 자주 쓰는 노트 형태를 위한 구조화된 출력.
      items:
        - label: 아이디어
          description: 생각을 정리하고 핵심 포인트를 뽑아 다음에 탐색할 방향을 제안합니다.
        - label: 회의
          description: 논의 내용, 결정 사항, 액션 아이템, 미해결 질문을 요약합니다.
        - label: 미리 알림
          description: 짧은 메모를 그냥 텍스트로 두지 않고 바로 실행 가능한 작업 초안으로 바꿉니다.
        - label: 요약
          description: 웹페이지, 채팅, 참고 자료를 핵심 내용으로 압축합니다.
        - label: 지식
          description: 하이라이트와 리서치 노트를 나중에 다시 쓰기 쉬운 형태로 정리합니다.
    next_steps:
      eyebrow: 다음에 할 수 있는 일
      title: 흐름을 벗어나지 않고 이해에서 실행으로 넘어가세요.
      items:
        - 노트 문맥이 이미 붙어 있는 AI 채팅으로 계속 이어 가기.
        - AI 결과에서 바로 리마인더, Things 항목, 후속 이메일 초안 만들기.
        - 원본 스크린샷 대신 공유용 이미지 카드 생성하기.
        - 저장된 노트를 검색하고 여러 노트를 일괄 요약하거나, 나중을 위해 보관 및 고정하기.
        - 한 번의 답변으로 끝나지 않는 작업에는 사용자 프롬프트와 샌드박스 워크스페이스 활용하기.
  trust:
    cards:
      - eyebrow: 기본적으로 더 비공개
        title: 내 노트는 내 계정에 그대로 연결됩니다.
        description: 노트는 공유 서비스 데이터베이스가 아니라 개인 iCloud 저장소에 머물기 때문에, 새로운 계정 시스템 없이도 가볍게 캡처를 시작할 수 있습니다.
      - eyebrow: 계속 이어지는 작업을 위한 설계
        title: 캡처에서 끝나지 않고 진행됩니다.
        description: 이 앱은 노트 인박스의 빠른 입력 속도를 유지하면서도 검색, 보관, 주제, AI chat, 공유 가능한 결과를 더해 중요한 노트가 실제 결과물로 이어지게 합니다.
  faq:
    eyebrow: FAQ
    title: 다운로드 전에 자주 묻는 질문을 먼저 확인하세요.
    description: 전체 도움말은 Support 페이지에 있습니다. 여기서는 AnyNotes+를 시도하기 전에 가장 많이 묻는 네 가지 질문만 먼저 답합니다.
    items:
      - question: AnyNotes+는 iPhone과 iPad에서 사용할 수 있나요?
        answer: 네. AnyNotes+는 App Store에서 iPhone과 iPad 모두 제공되며, 기기 간에도 같은 캡처 흐름을 유지합니다.
      - question: 노트는 어떻게 저장되나요?
        answer: 노트는 공유 서비스 데이터베이스가 아니라 CloudKit을 통해 내 iCloud 저장소에 보관됩니다.
      - question: 음성 메모, 사진, 링크를 요약으로 바꿀 수 있나요?
        answer: 네. 텍스트, 녹음, 사진, iOS 공유 시트에서 입력을 받아 AI 받은편지함이 더 명확한 제목, 요약, 결과 카드, 다음 단계를 만들어 줍니다.
      - question: AI 기능은 구독이 필요한가요?
        answer: 네. AI 기능은 AnyNotes Pro가 필요합니다. 또한 앱 안에서 본인의 OpenAI API key를 제공하거나 Codex로 로그인해야 합니다.
  cta:
    eyebrow: 아직 정리되지 않은 상태에서 시작하세요
    title: 먼저 모으고, 빠르게 정리하고, 흐름을 이어 가세요.
    description: 어떤 생각, 회의, 링크, 스크린샷, 음성 메모가 아직 덜 정리된 상태여도 나중에 더 명확한 결과가 필요하다는 걸 안다면, AnyNotes로 먼저 받아 둘 수 있습니다.
    app_store: App Store에서 다운로드
    testflight: TestFlight 베타 사용해 보기
    support: 질문이 있나요? Support 보기
