# Feature List                            Edit, add or remove features to be presented.
features:
  - title: Capture From Note, Record, Photo, Share, and Chat
    description: Start inside the app or from the iOS share sheet. Text, voice, photos, links, and chat transcripts all enter the same inbox flow instead of living in separate silos.
    fontawesome_icon_name: inbox

  - title: AI Result Cards for Every New Note
    description: AnyNotes automatically generates a clean title, summary, structured result card, and suggested next actions for ideas, meetings, reminders, summaries, and knowledge notes.
    fontawesome_icon_name: magic

  - title: Topics That Keep Evolving
    description: Move beyond isolated notes. Group related notes into Topics and keep an up-to-date synthesis with current decisions, recent changes, and the next move to make.
    fontawesome_icon_name: project-diagram

  - title: Turn Notes Into Action
    description: Draft reminders, Things tasks, and follow-up emails, continue in AI Chat, or export the main result as a shareable image instead of a noisy screenshot.
    fontawesome_icon_name: share-square

  - title: Deep Work With AI Chat
    description: Open a note-specific chat, use your own prompts, search saved notes, and hand off bigger tasks to the built-in sandbox workspace when a quick rewrite is not enough.
    fontawesome_icon_name: comments

  - title: Search, Archive, Sync
    description: Keep everything findable with search, tags, pinning, archive mode, batch summaries, and iCloud-backed storage tied to your own account.
    fontawesome_icon_name: search

