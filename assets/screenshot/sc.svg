        font-size: 46px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        fill: #5B675E;
      }
      .title {
        font-size: 62px;
        font-weight: 700;
        letter-spacing: -0.03em;
        fill: #16201C;
      }
      .body {
        font-size: 37px;
        font-weight: 500;
        fill: #5D665F;
      }
      .label {
        font-size: 33px;
        font-weight: 700;
        fill: #2F6B60;
      }
      .small {
        font-size: 31px;
        font-weight: 600;
        fill: #6C746E;
      }
      .chip {
        font-size: 31px;
        font-weight: 700;
      }
    </style>
  </defs>

  <rect width="1320" height="2868" fill="url(#bg)"/>

