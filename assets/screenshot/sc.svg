  <text x="219" y="1917" class="label">Current view</text>
  <text x="219" y="1968" class="body">Share flow, AI Inbox, and Topics are converging</text>
  <text x="219" y="2019" class="body">into a clearer “capture to outcome” story.</text>
  <text x="219" y="2090" class="label">Next move</text>
  <text x="219" y="2141" class="body">Ship the landing page and connect the product</text>
  <text x="219" y="2192" class="body">message to the current app flow.</text>

